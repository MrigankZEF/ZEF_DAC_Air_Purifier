<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZEF DAC Air Purifier · Room Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:        #F5F2EE;
      --bg-sunk:   #EEEAE4;
      --ink:       #1C1B1A;
      --ink-2:     #3D3B38;
      --ink-3:     #6B6862;
      --warm:      #C9C2B8;
      --warm-2:    #D9D3CA;
      --warm-3:    #E6E1D8;
      --hair:      rgba(28,27,26,0.12);
      --hair-strong: rgba(28,27,26,0.22);
      --accent:    #E4002B;
      --accent-ink: #B8001F;
      --font-display: 'Space Grotesk','Helvetica Neue',sans-serif;
      --font-body:    'Inter','Helvetica Neue',sans-serif;
      --font-mono:    'JetBrains Mono',ui-monospace,monospace;
      --lsp-tight: -0.03em;
      --lsp-label:  0.08em;
      --ease: cubic-bezier(.2,.8,.2,1);
      --dur-fast: 160ms;
      --dur: 320ms;
      --dur-slow: 520ms;
    }
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      font-feature-settings: "tnum" 1, "cv11" 1, "ss01" 1;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .num, .mono, input[type="text"], input[type="number"] {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }
    .mono { font-family: var(--font-mono); }
    .label { font-family: var(--font-body); font-size: 10.5px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
    .micro { font-size: 11px; color: var(--ink-3); letter-spacing: 0.01em; }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
    }

    /* ---------- Panel ---------- */
    .panel {
      background: var(--bg);
      border-right: 1px solid var(--hair);
      padding: 22px 22px 28px;
      display: flex; flex-direction: column; gap: 22px;
      position: sticky; top: 0;
      max-height: 100vh; overflow-y: auto;
    }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 2px; }
    .panel-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--hair);
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      width: 22px; height: 22px;
      border: 1px solid var(--ink);
      position: relative;
    }
    .brand-mark::after { content: ''; position: absolute; inset: 4px; border: 1px solid var(--accent); }
    .brand-title { font-family: var(--font-display); letter-spacing: var(--lsp-tight); font-size: 15px; font-weight: 600; white-space: nowrap; }
    .brand-sub { font-size: 10px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); white-space: nowrap; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(228,0,43,0.12);
      animation: pulse 2.4s var(--ease) infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(228,0,43,0.08); }
      50%      { box-shadow: 0 0 0 5px rgba(228,0,43,0.00); }
    }

    .group { display: flex; flex-direction: column; gap: 10px; }
    .group-head {
      display: flex; align-items: baseline; justify-content: space-between;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--hair);
    }
    .group-title { font-family: var(--font-display); font-size: 11px; letter-spacing: var(--lsp-label); text-transform: uppercase; font-weight: 600; }
    .group-index { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 26px;
    }
    .row .label-row { color: var(--ink-2); font-size: 11px; text-transform: none; letter-spacing: 0; font-weight: 400; }

    .stepper {
      display: inline-flex; align-items: stretch;
      border: 1px solid var(--hair-strong);
      background: var(--bg);
      border-radius: 4px;
      height: 26px;
      overflow: hidden;
    }
    .stepper button {
      width: 22px; border: 0; background: transparent;
      color: var(--ink-2); font-size: 13px; cursor: pointer;
      transition: background var(--dur-fast) var(--ease);
      padding: 0; font-family: inherit;
    }
    .stepper button:hover { background: var(--warm-3); color: var(--ink); }
    .stepper .val-input {
      border: 0; background: transparent;
      width: 56px; text-align: center;
      font-family: var(--font-mono); font-size: 12px;
      color: var(--ink); font-variant-numeric: tabular-nums;
      outline: none;
      border-left: 1px solid var(--hair);
      border-right: 1px solid var(--hair);
    }
    .unit { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-left: 6px; min-width: 28px; }

    .triple {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .field-label { font-size: 9.5px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); }
    .field-input {
      height: 30px;
      border: 1px solid var(--hair-strong);
      background: var(--bg);
      border-radius: 4px;
      padding: 0 8px;
      font-family: var(--font-mono); font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      outline: none;
      transition: border-color var(--dur-fast) var(--ease);
      width: 100%; min-width: 0;
    }
    .field-input:focus { border-color: var(--ink); }
    .derived { display: flex; justify-content: space-between; align-items: baseline; padding-top: 6px; }
    .derived-l { font-size: 10.5px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); }
    .derived-v { font-family: var(--font-mono); font-size: 13px; color: var(--ink); }

    .slider-wrap { display: flex; flex-direction: column; gap: 8px; }
    .slider-top { display: flex; justify-content: space-between; align-items: baseline; }
    .slider-value { font-family: var(--font-mono); font-size: 15px; color: var(--ink); font-variant-numeric: tabular-nums; }
    .slider-native {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 20px; background: transparent; outline: none; cursor: grab;
      margin: 0; padding: 0;
    }
    .slider-native::-webkit-slider-runnable-track { height: 1px; background: var(--hair-strong); border-radius: 0; }
    .slider-native::-moz-range-track { height: 1px; background: var(--hair-strong); border-radius: 0; }
    .slider-native::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--ink);
      margin-top: -6.5px; cursor: grab;
      transition: border-color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
    }
    .slider-native::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--ink); cursor: grab;
    }
    .slider-native:active::-webkit-slider-thumb { border-color: var(--accent); transform: scale(1.08); }
    .slider-native:active::-moz-range-thumb { border-color: var(--accent); }
    .slider-range { display: flex; justify-content: space-between; }
    .slider-range span { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--hair-strong);
      border-radius: 4px;
      overflow: hidden;
      height: 32px;
    }
    .segmented button {
      border: 0; background: transparent;
      border-right: 1px solid var(--hair);
      font-family: var(--font-body); font-size: 11px;
      letter-spacing: 0.04em; color: var(--ink-2);
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0;
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button:hover { background: var(--warm-3); color: var(--ink); }
    .segmented button.on { background: var(--ink); color: var(--bg); }
    .segmented button .m { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; font-variant-numeric: tabular-nums; }

    .run-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--hair);
    }
    .btn {
      height: 36px;
      border: 1px solid var(--ink);
      background: var(--ink); color: var(--bg);
      font-family: var(--font-display); letter-spacing: 0.02em; font-weight: 500;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
      padding: 0 14px;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); }
    .btn.ghost { background: transparent; color: var(--ink); }
    .btn.ghost:hover { background: var(--warm-3); color: var(--ink); border-color: var(--ink); }

    /* ---------- Canvas ---------- */
    .canvas {
      position: relative;
      padding: 26px 28px 36px;
      display: flex; flex-direction: column; gap: 18px;
      background:
        linear-gradient(to right,  rgba(201,194,184,0.22) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(to bottom, rgba(201,194,184,0.22) 1px, transparent 1px) 0 0 / 24px 24px,
        var(--bg);
      min-width: 0;
    }
    .canvas-head {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--hair);
    }
    .canvas-title .eyebrow {
      font-size: 10.5px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3);
      margin-bottom: 6px;
    }
    .canvas-title h1 {
      margin: 0;
      font-family: var(--font-display); letter-spacing: var(--lsp-tight); font-weight: 500;
      font-size: 26px; line-height: 1.1;
    }
    .canvas-title .sub { margin-top: 4px; font-size: 12px; color: var(--ink-3); }

    .readout { display: flex; flex-direction: column; gap: 4px; min-width: 128px; }
    .readout .k { font-size: 10px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); }
    .readout .v {
      font-family: var(--font-display); letter-spacing: var(--lsp-tight);
      font-weight: 500; font-size: 28px; line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      transition: color var(--dur) var(--ease);
    }
    .readout .v .u { font-family: var(--font-mono); font-weight: 400; font-size: 12px; color: var(--ink-3); margin-left: 4px; letter-spacing: 0; }
    .readout .sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
    .readout.accent .v { color: var(--accent); }

    .chart-card {
      background: var(--bg);
      border: 1px solid var(--hair);
      border-radius: 6px;
      padding: 18px 20px 14px;
      position: relative;
    }
    .chart-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .chart-card-title { font-family: var(--font-display); font-size: 12.5px; font-weight: 500; letter-spacing: var(--lsp-label); text-transform: uppercase; }
    .chart-card-legend { display: flex; gap: 18px; }
    .legend-item { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; color: var(--ink-2); }
    .legend-swatch { width: 14px; height: 2px; background: var(--ink); }
    .legend-swatch.warm { background: var(--warm); }

    .room-card {
      background: var(--bg);
      border: 1px solid var(--hair);
      border-radius: 6px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 24px;
    }
    .room-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .room-viz {
      position: relative;
      height: 220px;
      border: 1px solid var(--hair);
      border-radius: 4px;
      background:
        linear-gradient(to right,  rgba(201,194,184,0.18) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(to bottom, rgba(201,194,184,0.18) 1px, transparent 1px) 0 0 / 20px 20px,
        var(--bg);
      overflow: hidden;
    }
    .room-stats {
      display: flex; flex-direction: column; gap: 2px;
      border-left: 1px solid var(--hair);
      padding-left: 20px;
    }
    .stat { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--hair); }
    .stat:last-child { border-bottom: 0; }
    .stat .k { font-size: 10.5px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); }
    .stat .v { font-family: var(--font-mono); font-size: 12px; font-variant-numeric: tabular-nums; }

    .diag-card {
      background: var(--bg);
      border: 1px solid var(--hair);
      border-radius: 6px;
    }
    .diag-card > summary {
      padding: 12px 18px;
      cursor: pointer;
      list-style: none;
      display: flex; align-items: center; justify-content: space-between;
      user-select: none;
      font-family: var(--font-display); font-size: 12.5px; font-weight: 500;
      letter-spacing: var(--lsp-label); text-transform: uppercase;
    }
    .diag-card > summary::-webkit-details-marker { display: none; }
    .diag-card > summary::after {
      content: '+'; font-family: var(--font-mono); font-size: 16px; color: var(--ink-3);
      transition: transform var(--dur-fast) var(--ease);
    }
    .diag-card[open] > summary::after { content: '−'; }
    .diag-body { padding: 4px 18px 16px; display: flex; flex-direction: column; gap: 2px; border-top: 1px solid var(--hair); }
    .diag-row { display: grid; grid-template-columns: 160px 1fr auto; align-items: baseline; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--hair); }
    .diag-row:last-child { border-bottom: 0; }
    .diag-row .k { font-size: 10.5px; letter-spacing: var(--lsp-label); text-transform: uppercase; color: var(--ink-3); }
    .diag-row .v { font-family: var(--font-mono); font-size: 12px; color: var(--ink); font-variant-numeric: tabular-nums; text-align: right; }
    .diag-row .desc { font-size: 11px; color: var(--ink-3); }

    .hairline { height: 1px; background: var(--hair); width: 100%; }

    /* chart svg styling */
    .chart-svg { display: block; width: 100%; cursor: crosshair; }
    .chart-grid { stroke: var(--hair); stroke-width: 1; }
    .chart-axis { stroke: var(--hair-strong); stroke-width: 1; }
    .chart-line-main { fill: none; stroke: var(--ink); stroke-width: 1.5; }
    .chart-line-baseline { fill: none; stroke: var(--warm); stroke-width: 1.25; stroke-dasharray: 2 3; }
    .chart-target { stroke: var(--accent); stroke-width: 1; stroke-dasharray: 3 4; }
    .chart-label { font-family: var(--font-mono); font-size: 10px; fill: var(--ink-3); font-variant-numeric: tabular-nums; }
    .chart-tick { stroke: var(--hair); stroke-width: 1; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--hair); }
      .canvas-head { grid-template-columns: 1fr 1fr; gap: 14px; }
      .room-card { grid-template-columns: 1fr; }
      .room-stats { border-left: 0; padding-left: 0; border-top: 1px solid var(--hair); padding-top: 12px; }
      .diag-row { grid-template-columns: 1fr auto; }
      .diag-row .desc { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">

    /* =========================================================
       PHYSICS
       ---------------------------------------------------------
       STY(C̄, S) = (C̄ / 650 ppm) · (2.30e-6 − 1.73e-7 · S)
         C̄ = log-mean CO₂ across the absorber column [ppm]
         S  = CO₂ wt% in sump
         STY in mol CO₂ · m⁻¹ · s⁻¹

       Inner loop: iterate C_out until column mass balance is
       consistent with STY-based capture. Warm-start from previous
       time step's converged C_out to prevent jagged curves at high
       ppm. Under-relaxation α = 0.6 damps residual oscillation.

       Outer loop: room well-mixed CV, forward-Euler mass balance.
       No ventilation term (v2, per VISION.md).

    const M_CO2 = 44.01;
    const AIR_MOL_PER_M3 = 41.57;
    const GRAMS_PER_PPM_M3 = 1.8e-3;
    const STY_K_PPM = 650;
    const STY_A = 2.30e-6;
    const STY_B = 1.73e-7;

    function logMean(a, b) {
      if (a <= 0 && b <= 0) return 0;
      if (Math.abs(a - b) < 1) return 0.5 * (a + b);
      const a2 = Math.max(a, 1e-3);
      const b2 = Math.max(b, 1e-3);
      return (a2 - b2) / (Math.log(a2) - Math.log(b2));
    }

    function sty(c_avg_ppm, s_sump_wtpct) {
      if (c_avg_ppm <= 0) return 0;
      const linear = Math.max(0, STY_A - STY_B * s_sump_wtpct);
      return (c_avg_ppm / STY_K_PPM) * linear;
    }

    function airMolPerH(flow_m3h) {
      return Math.max(0, flow_m3h) * AIR_MOL_PER_M3;
    }

    function convergeAbsorber({
      c_in, s_sump_pct, totalWire_m, airMol_h,
      warmStart = null, maxIter = 50, tol = 1.0,
    }) {
      if (totalWire_m <= 0 || airMol_h <= 0 || c_in <= 0) {
        return { c_out: c_in, c_avg: c_in, capture_mol_h: 0, sty: 0, iter: 0, converged: true };
      }
      const co2_in_h = (c_in / 1e6) * airMol_h;

      // Warm-start from previous step's converged c_out; avoids large jump from ambient each step
      let c_out = warmStart != null
        ? Math.max(0, Math.min(c_in, warmStart))
        : c_in * 0.95;

      let capture_mol_h = 0, c_avg = c_in, styNow = 0;
      let iter = 0, converged = false;

      for (iter = 1; iter <= maxIter; iter++) {
        c_avg = logMean(c_in, Math.max(1e-3, c_out));
        styNow = sty(c_avg, s_sump_pct);
        capture_mol_h = Math.min(co2_in_h, totalWire_m * styNow * 3600);
        const co2_out_h = co2_in_h - capture_mol_h;
        const c_out_new = (co2_out_h / airMol_h) * 1e6;

        const relaxed = 0.6 * c_out_new + 0.4 * c_out;
        if (Math.abs(relaxed - c_out) < tol) {
          c_out = relaxed;
          c_avg = logMean(c_in, Math.max(1e-3, c_out));
          styNow = sty(c_avg, s_sump_pct);
          capture_mol_h = Math.min(co2_in_h, totalWire_m * styNow * 3600);
          converged = true;
          break;
        }
        c_out = relaxed;
      }
      return { c_out, c_avg, capture_mol_h, sty: styNow, iter, converged };
    }

    function simulate(p) {
      const V = Math.max(0.1, p.L * p.W * p.H);
      const totalWire = Math.max(0, p.totalWire_m);
      const airMolH = airMolPerH(p.fan_m3h);
      const gen_g_h = Math.max(0, p.people * p.g_per_person_per_h);
      const dt_h = p.dt_min / 60;
      const steps = Math.ceil((p.hours * 60) / p.dt_min);

      const series = new Array(steps + 1);
      let c_room = p.c0_ppm;
      let prevCout = null; // warm-start for inner loop
      let timeToTarget = null;

      for (let i = 0; i <= steps; i++) {
        const t_min = i * p.dt_min;
        const res = convergeAbsorber({
          c_in: c_room,
          s_sump_pct: p.s_sump_pct,
          totalWire_m: totalWire,
          airMol_h: airMolH,
          warmStart: prevCout,
        });
        prevCout = res.c_out;
        const capture_g_h = res.capture_mol_h * M_CO2;
        series[i] = {
          t_min,
          c_ppm: c_room,
          c_out_ppm: res.c_out,
          c_avg_ppm: res.c_avg,
          sty: res.sty,
          capture_mol_h: res.capture_mol_h,
          capture_g_h,
          gen_g_h,
          iter: res.iter,
          converged: res.converged,
        };
        if (timeToTarget === null) {
          if (p.c0_ppm > p.c_target_ppm && c_room <= p.c_target_ppm) timeToTarget = t_min;
          if (p.c0_ppm < p.c_target_ppm && c_room >= p.c_target_ppm) timeToTarget = t_min;
        }
        const net_g_h = gen_g_h - capture_g_h;
        const dcdt = net_g_h / (V * GRAMS_PER_PPM_M3);
        c_room = Math.max(0, c_room + dcdt * dt_h);
      }

      // Machine-off baseline: generation only, linear rise
      const baseline = new Array(steps + 1);
      const baseSlope = gen_g_h / (V * GRAMS_PER_PPM_M3);
      for (let i = 0; i <= steps; i++) {
        baseline[i] = { t_min: i * p.dt_min, c_ppm: p.c0_ppm + baseSlope * (i * p.dt_min / 60) };
      }

      return {
        series, baseline,
        V, totalWire, airMolH, genGH: gen_g_h,
        timeToTargetMin: timeToTarget,
        initial: series[0],
      };
    }

    function formatMin(totalMin) {
      if (totalMin == null) return '——';
      if (totalMin < 1) return '<1 min';
      const h = Math.floor(totalMin / 60);
      const m = Math.round(totalMin - h * 60);
      if (h === 0) return `${m} min`;
      if (m === 0) return `${h} h`;
      return `${h} h ${m} min`;
    }

    function fmt(x, n = 1) {
      if (!isFinite(x)) return '——';
      return Number(x).toLocaleString(undefined, { minimumFractionDigits: n, maximumFractionDigits: n });
    }

    /* =========================================================
       UI PRIMITIVES
       ========================================================= */

    function Group({ title, index, children }) {
      return (
        <div className="group">
          <div className="group-head">
            <span className="group-title">{title}</span>
            <span className="group-index">{index}</span>
          </div>
          {children}
        </div>
      );
    }

    function Stepper({ value, onChange, step = 1, min = 0, max = 9999, unit, decimals = null }) {
      const dec = decimals != null ? decimals : (step < 1 ? 2 : 0);
      const [draft, setDraft] = useState(String(value.toFixed(dec)));
      React.useEffect(() => { setDraft(String(Number(value).toFixed(dec))); }, [value, dec]);
      const clamp = v => Math.max(min, Math.min(max, v));
      const commit = (v) => {
        const n = Number(v);
        if (!isFinite(n)) { setDraft(String(Number(value).toFixed(dec))); return; }
        onChange(clamp(n));
      };
      return (
        <div style={{ display: 'inline-flex', alignItems: 'center' }}>
          <div className="stepper">
            <button onClick={() => onChange(clamp(Number((value - step).toFixed(4))))}>−</button>
            <input
              className="val-input"
              value={draft}
              onChange={e => setDraft(e.target.value)}
              onBlur={e => commit(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
            />
            <button onClick={() => onChange(clamp(Number((value + step).toFixed(4))))}>+</button>
          </div>
          {unit && <span className="unit">{unit}</span>}
        </div>
      );
    }

    function Field({ label, unit, value, onChange, step = 0.1, min = 0.1, max = 99 }) {
      const [draft, setDraft] = useState(String(value));
      React.useEffect(() => { setDraft(String(value)); }, [value]);
      const commit = (v) => {
        const n = Number(v);
        if (!isFinite(n)) { setDraft(String(value)); return; }
        onChange(Math.max(min, Math.min(max, n)));
      };
      return (
        <div className="field">
          <span className="field-label">{label} <span style={{ color: 'var(--ink-3)', textTransform: 'none' }}>{unit}</span></span>
          <input
            className="field-input"
            type="text" inputMode="decimal"
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onBlur={e => commit(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
          />
        </div>
      );
    }

    // Segmented control — options may include optional activeStyle for per-option active appearance
    function Segmented({ options, value, onChange }) {
      return (
        <div className="segmented" style={{ gridTemplateColumns: `repeat(${options.length}, 1fr)` }}>
          {options.map(o => {
            const isOn = value === o.value;
            const inlineStyle = isOn && o.activeStyle ? o.activeStyle : {};
            return (
              <button
                key={o.value}
                className={isOn ? 'on' : ''}
                style={inlineStyle}
                onClick={() => onChange(o.value)}
              >
                {o.label}{o.meta != null && <span className="m">{o.meta}</span>}
              </button>
            );
          })}
        </div>
      );
    }

    function Slider({ value, onChange, min = 0, max = 100, step = 1 }) {
      return (
        <input
          type="range"
          className="slider-native"
          min={min} max={max} step={step} value={value}
          onChange={e => onChange(Number(e.target.value))}
        />
      );
    }

    function Readout({ k, v, unit, sub, accent, delay = 0 }) {
      return (
        <div className={`readout ${accent ? 'accent' : ''}`} style={{ transitionDelay: `${delay}ms` }}>
          <span className="k">{k}</span>
          <span className="v">
            {v}{unit && <span className="u">{unit}</span>}
          </span>
          {sub && <span className="sub">{sub}</span>}
        </div>
      );
    }

    /* =========================================================
       CHART
       ========================================================= */

    function PPMChart({ series, baseline, c_target, c_amb, width = 960, height = 260 }) {
      const svgRef = useRef(null);
      const [hover, setHover] = useState(null);

      const pad = { t: 14, r: 18, b: 28, l: 48 };
      const w = width, h = height;
      const iw = w - pad.l - pad.r;
      const ih = h - pad.t - pad.b;

      const tMax = series[series.length - 1].t_min;
      const allC = series.map(d => d.c_ppm).concat(baseline.map(d => d.c_ppm));
      const cMaxRaw = Math.max(...allC, c_target, c_amb);
      const cMinRaw = Math.min(...allC, c_target, c_amb);
      const pad_v = Math.max(50, (cMaxRaw - cMinRaw) * 0.1);
      const cMax = Math.ceil((cMaxRaw + pad_v) / 100) * 100;
      const cMin = Math.max(0, Math.floor((cMinRaw - pad_v) / 100) * 100);

      const x = t => pad.l + (t / tMax) * iw;
      const y = c => pad.t + (1 - (c - cMin) / (cMax - cMin)) * ih;

      const linePath = pts => pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.t_min).toFixed(1)},${y(p.c_ppm).toFixed(1)}`).join(' ');

      const fillPath = pts => {
        const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.t_min).toFixed(1)},${y(p.c_ppm).toFixed(1)}`).join(' ');
        return `${d} L${(w - pad.r).toFixed(1)},${(h - pad.b).toFixed(1)} L${pad.l.toFixed(1)},${(h - pad.b).toFixed(1)} Z`;
      };

      const yTicks = 5;
      const xTicks = 6;
      const yVals = Array.from({ length: yTicks + 1 }, (_, i) => cMin + (cMax - cMin) * i / yTicks);
      const xVals = Array.from({ length: xTicks + 1 }, (_, i) => (tMax * i) / xTicks);

      const handleMouseMove = (e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
        if (svgPt.x < pad.l || svgPt.x > w - pad.r) { setHover(null); return; }
        const t_frac = Math.max(0, Math.min(1, (svgPt.x - pad.l) / iw));
        const idx = Math.round(t_frac * (series.length - 1));
        const d = series[Math.max(0, Math.min(series.length - 1, idx))];
        setHover({ svgX: x(d.t_min), svgY: y(d.c_ppm), ...d });
      };

      const tooltipW = 128, tooltipH = 66;

      return (
        <svg
          ref={svgRef}
          className="chart-svg"
          viewBox={`0 0 ${w} ${h}`}
          preserveAspectRatio="xMidYMid meet"
          onMouseMove={handleMouseMove}
          onMouseLeave={() => setHover(null)}
        >
          <defs>
            <linearGradient id="chart-fill-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#1C1B1A" stopOpacity="0.07" />
              <stop offset="100%" stopColor="#1C1B1A" stopOpacity="0" />
            </linearGradient>
          </defs>

          {/* grid */}
          {yVals.map((v, i) => (
            <line key={`yg${i}`} className="chart-grid" x1={pad.l} x2={w - pad.r} y1={y(v)} y2={y(v)} />
          ))}
          {xVals.map((v, i) => (
            <line key={`xg${i}`} className="chart-grid" x1={x(v)} x2={x(v)} y1={pad.t} y2={h - pad.b} opacity={0.5} />
          ))}

          {/* axes */}
          <line className="chart-axis" x1={pad.l} y1={pad.t} x2={pad.l} y2={h - pad.b} />
          <line className="chart-axis" x1={pad.l} y1={h - pad.b} x2={w - pad.r} y2={h - pad.b} />

          {/* ambient band */}
          <line x1={pad.l} x2={w - pad.r} y1={y(c_amb)} y2={y(c_amb)} stroke="var(--warm)" strokeWidth="1" opacity="0.7" />

          {/* target */}
          <line className="chart-target" x1={pad.l} x2={w - pad.r} y1={y(c_target)} y2={y(c_target)} />
          <text className="chart-label" x={w - pad.r - 2} y={y(c_target) - 4} textAnchor="end" fill="var(--accent)">TARGET {c_target} ppm</text>

          {/* baseline (machine off) */}
          <path className="chart-line-baseline" d={linePath(baseline)} />

          {/* gradient fill under main curve */}
          <path d={fillPath(series)} fill="url(#chart-fill-grad)" />

          {/* main curve */}
          <path className="chart-line-main" d={linePath(series)} />

          {/* y tick labels */}
          {yVals.map((v, i) => (
            <g key={`yl${i}`}>
              <line className="chart-tick" x1={pad.l - 4} x2={pad.l} y1={y(v)} y2={y(v)} />
              <text className="chart-label" x={pad.l - 8} y={y(v) + 3} textAnchor="end">{Math.round(v)}</text>
            </g>
          ))}
          {/* x tick labels */}
          {xVals.map((v, i) => (
            <g key={`xl${i}`}>
              <line className="chart-tick" x1={x(v)} x2={x(v)} y1={h - pad.b} y2={h - pad.b + 4} />
              <text className="chart-label" x={x(v)} y={h - pad.b + 16} textAnchor="middle">{Math.round(v)}</text>
            </g>
          ))}

          {/* axis titles */}
          <text className="chart-label" x={pad.l} y={pad.t - 4} fill="var(--ink-3)">ppm</text>
          <text className="chart-label" x={w - pad.r} y={h - 4} textAnchor="end" fill="var(--ink-3)">minutes</text>

          {/* hover crosshair + tooltip */}
          {hover && (() => {
            const tx = hover.svgX + 12 + tooltipW > w - pad.r ? hover.svgX - tooltipW - 12 : hover.svgX + 12;
            const ty = Math.max(pad.t, Math.min(h - pad.b - tooltipH, hover.svgY - tooltipH / 2));
            return (
              <g>
                <line x1={hover.svgX} x2={hover.svgX} y1={pad.t} y2={h - pad.b}
                  stroke="var(--ink-3)" strokeWidth="0.75" opacity="0.45" />
                <circle cx={hover.svgX} cy={hover.svgY} r="3.5" fill="var(--bg)" stroke="var(--ink)" strokeWidth="1.5" />
                <rect x={tx} y={ty} width={tooltipW} height={tooltipH} rx="3"
                  fill="var(--bg)" stroke="var(--hair-strong)" strokeWidth="1" />
                <text x={tx + 9} y={ty + 15}
                  style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, fill: 'var(--ink-3)', letterSpacing: '0.06em' }}>
                  {formatMin(hover.t_min)}
                </text>
                <text x={tx + 9} y={ty + 32}
                  style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 600, fill: 'var(--ink)', letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>
                  {Math.round(hover.c_ppm)} ppm
                </text>
                <text x={tx + 9} y={ty + 48}
                  style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, fill: 'var(--ink-3)' }}>
                  {fmt(hover.capture_g_h, 1)} g/h capture
                </text>
                <text x={tx + 9} y={ty + 60}
                  style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, fill: 'var(--ink-3)' }}>
                  {fmt(hover.sty * 1e6, 2)}×10⁻⁶ STY
                </text>
              </g>
            );
          })()}
        </svg>
      );
    }

    /* =========================================================
       ISO ROOM
       ========================================================= */

    function IsoRoom({ L, W, H, ppm, c_amb, c_target, people = 0 }) {
      const vbW = 560, vbH = 240;
      const cosA = Math.cos(Math.PI / 6);
      const sinA = Math.sin(Math.PI / 6);

      const refScale = 22;
      const pad = 40;
      const projW_m = (L + W) * cosA;
      const projH_m = (L + W) * sinA + H * 0.9;
      const fitScaleW = (vbW - pad * 2) / projW_m;
      const fitScaleH = (vbH - pad * 2) / projH_m;
      const scale = Math.min(refScale, fitScaleW, fitScaleH);

      const project = (x, y, z) => [
        (x - y) * cosA * scale,
        (x + y) * sinA * scale - z * 0.9 * scale,
      ];

      const fRaw = [
        project(0, 0, 0), project(L, 0, 0), project(L, W, 0), project(0, W, 0),
      ];
      const cRaw = [
        project(0, 0, H), project(L, 0, H), project(L, W, H), project(0, W, H),
      ];

      const all = fRaw.concat(cRaw);
      const xs = all.map(p => p[0]);
      const ys = all.map(p => p[1]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const tx = vbW / 2 - (minX + maxX) / 2;
      const ty = vbH / 2 - (minY + maxY) / 2;

      const tr = ([x, y]) => [x + tx, y + ty];
      const pt = (x, y, z) => tr(project(x, y, z));
      const f = fRaw.map(tr);
      const c = cRaw.map(tr);

      const over = Math.max(0, ppm - c_amb);
      const range = Math.max(200, c_target * 2 - c_amb);
      const t = Math.min(1, over / range);
      const severityColor = t < 0.35 ? '#6B7A55' : (t < 0.75 ? '#A8751F' : 'var(--accent)');

      // DAC unit — slender tower, placed in back-right corner of room
      // Visible faces in this isometric view: near (low-y), right (high-x), top
      const dW = 0.38, dD = 0.28, dH = 1.05; // width (x), depth (y), height (z)
      const offX = Math.min(0.35, L * 0.07);
      const offY = Math.min(0.30, W * 0.07);
      const dx0 = Math.max(0.1, L - dW - offX);
      const dx1 = Math.min(L - 0.05, dx0 + dW);
      const dy0 = Math.max(0.05, offY);
      const dy1 = Math.min(W - 0.05, dy0 + dD);

      // 8 corners of DAC box
      const q = (x, y, z) => pt(x, y, z);
      const b00 = q(dx0, dy0, 0),  b10 = q(dx1, dy0, 0);
      const b11 = q(dx1, dy1, 0),  b01 = q(dx0, dy1, 0);
      const t00 = q(dx0, dy0, dH), t10 = q(dx1, dy0, dH);
      const t11 = q(dx1, dy1, dH), t01 = q(dx0, dy1, dH);

      const topCtr = pt((dx0 + dx1) / 2, (dy0 + dy1) / 2, dH);

      // People dots
      const ppl = [];
      const nP = Math.max(0, Math.min(8, Math.round(people)));
      const layout = [
        [0.28, 0.55], [0.50, 0.22], [0.28, 0.28],
        [0.18, 0.68], [0.52, 0.62], [0.38, 0.42],
        [0.15, 0.42], [0.44, 0.18],
      ];
      for (let i = 0; i < nP; i++) {
        const [rx, ry] = layout[i];
        ppl.push(pt(rx * L, ry * W, 0));
      }

      const poly = pts => pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');

      return (
        <svg viewBox={`0 0 ${vbW} ${vbH}`} preserveAspectRatio="xMidYMid meet" style={{ width: '100%', height: '100%' }}>
          <defs>
            <pattern id="floor-lines" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(28,27,26,0.05)" strokeWidth="1" />
            </pattern>
          </defs>

          {/* floor */}
          <polygon points={poly(f)} fill="var(--warm-3)" stroke="var(--hair-strong)" strokeWidth="1" />
          <polygon points={poly(f)} fill="url(#floor-lines)" />

          {/* back walls */}
          <polygon points={poly([f[0], c[0], c[1], f[1]])} fill="var(--warm-2)" stroke="var(--hair-strong)" strokeWidth="1" />
          <polygon points={poly([f[1], c[1], c[2], f[2]])} fill="var(--warm-3)" stroke="var(--hair-strong)" strokeWidth="1" />

          {/* people */}
          {ppl.map(([px, py], i) => (
            <g key={i}>
              <ellipse cx={px} cy={py + 1} rx="4.5" ry="1.8" fill="rgba(28,27,26,0.15)" />
              <circle cx={px} cy={py - 7} r="2.6" fill="var(--ink)" />
              <path d={`M ${px - 2.4} ${py - 4} Q ${px} ${py - 6} ${px + 2.4} ${py - 4} L ${px + 2} ${py + 1} L ${px - 2} ${py + 1} Z`} fill="var(--ink)" />
            </g>
          ))}

          {/* DAC unit — three visible faces: near (low-y), right (high-x), top */}
          <g>
            {/* floor shadow to ground the unit */}
            <ellipse
              cx={(b00[0] + b11[0]) / 2}
              cy={(b00[1] + b11[1]) / 2 + 1}
              rx={scale * dW * cosA * 0.75}
              ry={scale * dD * sinA * 0.75}
              fill="rgba(28,27,26,0.10)"
            />

            {/* right face — high-x face, darkest */}
            <polygon points={poly([b10, b11, t11, t10])} fill="#1C1B1A" stroke="#0E0D0C" strokeWidth="0.75" />

            {/* near face — low-y face, visible from front */}
            <polygon points={poly([b00, b10, t10, t00])} fill="#2A2928" stroke="#0E0D0C" strokeWidth="0.75" />

            {/* near face slats — thin horizontal lines at varying z */}
            {[0.28, 0.44, 0.60].map((fz, i) => {
              const a = pt(dx0 + dW * 0.12, dy0, dH * fz);
              const b2 = pt(dx1 - dW * 0.12, dy0, dH * fz);
              return <line key={i} x1={a[0]} y1={a[1]} x2={b2[0]} y2={b2[1]}
                stroke="#6B6862" strokeWidth="0.7" strokeLinecap="round" />;
            })}

            {/* top face — warm off-white */}
            <polygon points={poly([t00, t10, t11, t01])} fill="#E6E1D8" stroke="#3D3B38" strokeWidth="0.75" />

            {/* top intake ellipse */}
            <ellipse cx={topCtr[0]} cy={topCtr[1]}
              rx={scale * Math.min(dW, dD) * 0.28 * cosA}
              ry={scale * Math.min(dW, dD) * 0.28 * sinA}
              fill="#3D3B38" stroke="#3D3B38" strokeWidth="0.5" />

            {/* red LED — on near face */}
            {(() => {
              const led = pt((dx0 + dx1) / 2, dy0, dH * 0.78);
              return <>
                <circle cx={led[0]} cy={led[1]} r="5" fill="var(--accent)" opacity="0.15" />
                <circle cx={led[0]} cy={led[1]} r="2" fill="var(--accent)" />
              </>;
            })()}

            {/* ZEF label on near face */}
            {(() => {
              const lbl = pt((dx0 + dx1) / 2, dy0, dH * 0.22);
              return <text x={lbl[0]} y={lbl[1]} textAnchor="middle"
                style={{ fontFamily: 'var(--font-display)', fontSize: 7, fontWeight: 600, fill: '#6B6862', letterSpacing: '0.12em' }}>
                ZEF
              </text>;
            })()}
          </g>

          {/* ppm readout */}
          <g transform={`translate(${vbW - 14}, 20)`} textAnchor="end">
            <text style={{ fontFamily: 'var(--font-mono)', fontSize: 9.5, fill: 'var(--ink-3)', letterSpacing: '0.12em' }}>ROOM · PPM</text>
            <text y="22" style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontWeight: 500, fill: severityColor, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.03em' }}>
              {Math.round(ppm)}
            </text>
          </g>

          {/* dimensions label */}
          <g transform={`translate(14, ${vbH - 16})`}>
            <text style={{ fontFamily: 'var(--font-mono)', fontSize: 9, fill: 'var(--ink-3)', letterSpacing: '0.08em' }}>
              {L.toFixed(1)} × {W.toFixed(1)} × {H.toFixed(1)} m
            </text>
          </g>
        </svg>
      );
    }

    /* =========================================================
       APP
       ========================================================= */

    const ROOM_PRESETS = [
      { label: 'Bedroom', value: 'bedroom', L: 3,  W: 3, H: 2.4 },
      { label: 'Living',  value: 'living',  L: 5,  W: 4, H: 2.6 },
      { label: 'Office',  value: 'office',  L: 8,  W: 5, H: 2.8 },
    ];

    const FAN_PRESETS = [
      { value: 'sleep',    label: 'Sleep',    meta: '100', m3h: 100,
        activeStyle: { background: 'var(--ink-3)', color: 'var(--bg)' } },
      { value: 'standard', label: 'Standard', meta: '300', m3h: 300,
        activeStyle: null },
      { value: 'turbo',    label: 'Turbo',    meta: '800', m3h: 800,
        activeStyle: { background: 'var(--accent)', color: '#fff' } },
      { value: 'custom',   label: 'Custom',   meta: '——',  m3h: null,
        activeStyle: null },
    ];

    function App() {
      // Room
      const [L, setL] = useState(5.0);
      const [W, setW] = useState(4.0);
      const [H, setH] = useState(2.6);
      // CO2
      const [c0, setC0] = useState(1200);
      const [cTarget, setCTarget] = useState(600);
      const [cAmb, setCAmb] = useState(420);
      // Occupancy
      const [people, setPeople] = useState(2);
      const [perPerson, setPerPerson] = useState(35);
      // Absorber — header plates × wires per plate × wire length
      const [headerPlates, setHeaderPlates] = useState(10);
      const [wiresPerPlate, setWiresPerPlate] = useState(160);
      const [wireLen, setWireLen] = useState(1.0);
      // Fan
      const [fanPreset, setFanPreset] = useState('standard');
      const [fanCustom, setFanCustom] = useState(300);
      // Sump
      const [sSump, setSSump] = useState(8);
      // Sim
      const [hours, setHours] = useState(1);

      const fan_m3h = fanPreset === 'custom' ? fanCustom : FAN_PRESETS.find(p => p.value === fanPreset).m3h;
      const V = useMemo(() => L * W * H, [L, W, H]);
      const totalWire = useMemo(() => headerPlates * wiresPerPlate * wireLen, [headerPlates, wiresPerPlate, wireLen]);

      // Active room preset: matches if all three dims are exact
      const activeRoomPreset = ROOM_PRESETS.find(
        p => Math.abs(p.L - L) < 0.01 && Math.abs(p.W - W) < 0.01 && Math.abs(p.H - H) < 0.01
      )?.value ?? null;

      const result = useMemo(() => simulate({
        L, W, H,
        c0_ppm: c0, c_target_ppm: cTarget, c_amb_ppm: cAmb,
        people, g_per_person_per_h: perPerson,
        totalWire_m: totalWire,
        fan_m3h,
        s_sump_pct: sSump,
        hours, dt_min: 2,
      }), [L, W, H, c0, cTarget, cAmb, people, perPerson, totalWire, fan_m3h, sSump, hours]);

      const current = result.initial;
      const ttT = result.timeToTargetMin;
      const netG = current.capture_g_h - current.gen_g_h;

      return (
        <div className="app">
          {/* ============ LEFT: CONTROLS ============ */}
          <aside className="panel">
            <div className="panel-head">
              <div className="brand">
                <img src={LOGO_SRC} alt="ZEF" style={{ width: 22, height: 22, objectFit: 'contain', display: 'block' }} />
                <div>
                  <div className="brand-title">ZEF DAC</div>
                  <div className="brand-sub">AIR PURIFIER · ROOM SIM</div>
                </div>
              </div>
              <span className="micro mono" style={{ textTransform: 'uppercase', letterSpacing: '0.12em', color: 'var(--ink-3)' }}>v0.2</span>
            </div>

            <Group title="Room" index="01">
              <Segmented
                options={ROOM_PRESETS.map(p => ({ value: p.value, label: p.label }))}
                value={activeRoomPreset}
                onChange={(v) => {
                  const p = ROOM_PRESETS.find(r => r.value === v);
                  if (p) { setL(p.L); setW(p.W); setH(p.H); }
                }}
              />
              <div className="triple">
                <Field label="L" unit="m" value={L} onChange={setL} min={1} max={30} />
                <Field label="W" unit="m" value={W} onChange={setW} min={1} max={20} />
                <Field label="H" unit="m" value={H} onChange={setH} min={2} max={6} />
              </div>
              <div className="derived">
                <span className="derived-l">Volume</span>
                <span className="derived-v">{fmt(V, 1)} <span style={{ color: 'var(--ink-3)' }}>m³</span></span>
              </div>
            </Group>

            <Group title="CO₂" index="02">
              <div className="row">
                <span className="label label-row">Initial</span>
                <Stepper value={c0} onChange={setC0} step={50} min={0} max={5000} unit="ppm" decimals={0} />
              </div>
              <div className="row">
                <span className="label label-row">Target</span>
                <Stepper value={cTarget} onChange={setCTarget} step={25} min={0} max={5000} unit="ppm" decimals={0} />
              </div>
              <div className="row">
                <span className="label label-row">Ambient</span>
                <Stepper value={cAmb} onChange={setCAmb} step={5} min={0} max={700} unit="ppm" decimals={0} />
              </div>
            </Group>

            <Group title="Occupancy" index="03">
              <div className="row">
                <span className="label label-row">People</span>
                <Stepper value={people} onChange={setPeople} step={1} min={0} max={20} unit="pax" decimals={0} />
              </div>
              <div className="row">
                <span className="label label-row">CO₂ per person</span>
                <Stepper value={perPerson} onChange={setPerPerson} step={1} min={10} max={80} unit="g/h" decimals={0} />
              </div>
              <div className="derived">
                <span className="derived-l">Generation</span>
                <span className="derived-v">{fmt(people * perPerson, 0)} <span style={{ color: 'var(--ink-3)' }}>g/h</span></span>
              </div>
            </Group>

            <Group title="Absorber" index="04">
              <div className="row">
                <span className="label label-row">Header plates</span>
                <Stepper value={headerPlates} onChange={setHeaderPlates} step={1} min={1} max={200} unit="n" decimals={0} />
              </div>
              <div className="row">
                <span className="label label-row">Wires / plate</span>
                <Stepper value={wiresPerPlate} onChange={setWiresPerPlate} step={1} min={1} max={200} unit="n" decimals={0} />
              </div>
              <div className="row">
                <span className="label label-row">Wire length</span>
                <Stepper value={wireLen} onChange={setWireLen} step={0.05} min={0.1} max={5} unit="m" decimals={2} />
              </div>
              <div className="derived">
                <span className="derived-l">Total wire</span>
                <span className="derived-v">
                  {headerPlates}×{wiresPerPlate}×{fmt(wireLen, 2)} = {fmt(totalWire, 1)} <span style={{ color: 'var(--ink-3)' }}>m</span>
                </span>
              </div>
              {(() => {
                const pkgH = wireLen + 0.1;
                const pkgW = (0.4 / 160) * wiresPerPlate;
                const pkgB = headerPlates * 0.01;
                const pkgVol_L = pkgH * pkgW * pkgB * 1000;
                return (
                  <div className="derived">
                    <span className="derived-l">Package vol.</span>
                    <span className="derived-v">{fmt(pkgVol_L, 1)} <span style={{ color: 'var(--ink-3)' }}>L</span></span>
                  </div>
                );
              })()}
            </Group>

            <Group title="Fan" index="05">
              <Segmented
                options={FAN_PRESETS.map(p => ({ value: p.value, label: p.label, meta: p.meta, activeStyle: p.activeStyle }))}
                value={fanPreset}
                onChange={setFanPreset}
              />
              {fanPreset === 'custom' && (
                <div className="row">
                  <span className="label label-row">Custom flow</span>
                  <Stepper value={fanCustom} onChange={setFanCustom} step={25} min={50} max={1500} unit="m³/h" decimals={0} />
                </div>
              )}
              <div className="derived">
                <span className="derived-l">Flow</span>
                <span className="derived-v">{fan_m3h} <span style={{ color: 'var(--ink-3)' }}>m³/h</span></span>
              </div>
            </Group>

            <Group title="Sump CO₂ Loading" index="06">
              <div className="slider-wrap">
                <div className="slider-top">
                  <span className="label">S (wt% CO₂ in sump)</span>
                  <span className="slider-value">{fmt(sSump, 1)}<span style={{ color: 'var(--ink-3)', fontSize: 11, marginLeft: 3 }}>wt%</span></span>
                </div>
                <Slider value={sSump} onChange={setSSump} min={0} max={13} step={0.1} />
                <div className="slider-range">
                  <span>0%</span>
                  <span>6.5%</span>
                  <span>13%</span>
                </div>
              </div>
            </Group>

            <Group title="Horizon" index="07">
              <div className="row">
                <span className="label label-row">Sim hours</span>
                <Stepper value={hours} onChange={setHours} step={1} min={1} max={24} unit="h" decimals={0} />
              </div>
            </Group>

            <div className="run-bar" style={{ gridTemplateColumns: '1fr' }}>
              <button className="btn ghost" onClick={() => {
                setL(5); setW(4); setH(2.6);
                setC0(1200); setCTarget(600); setCAmb(420);
                setPeople(2); setPerPerson(35);
                setHeaderPlates(10); setWiresPerPlate(160); setWireLen(1.0);
                setFanPreset('standard'); setFanCustom(300);
                setSSump(8); setHours(6);
              }}>↻ RESET TO DEFAULTS</button>
            </div>
          </aside>

          {/* ============ RIGHT: CANVAS ============ */}
          <main className="canvas">
            <div className="canvas-head">
              <div className="canvas-title">
                <div className="eyebrow">SIMULATION · MODE 001</div>
                <h1>Indoor CO₂ Drawdown</h1>
                <div className="sub">
                  {fmt(V, 1)} m³ · {headerPlates}×{wiresPerPlate}×{fmt(wireLen, 2)} m ({fmt(totalWire, 1)} m) · {fan_m3h} m³/h · S {fmt(sSump, 1)} wt%
                </div>
              </div>
              <Readout k="CURRENT ppm" v={Math.round(current.c_ppm)} unit="ppm" sub={`Δ ${Math.round(current.c_ppm - cTarget)} to target`} delay={0} />
              <Readout k="CAPTURE" v={fmt(current.capture_g_h, 2)} unit="g/h" sub={`${fmt(current.capture_mol_h, 4)} mol/h`} accent delay={60} />
              <Readout k="TIME TO TARGET" v={formatMin(ttT)} sub={ttT == null ? 'not reached' : `from ${c0} → ${cTarget} ppm`} delay={120} />
            </div>

            <section className="chart-card">
              <div className="chart-card-head">
                <div className="chart-card-title">PPM · OVER TIME</div>
                <div className="chart-card-legend">
                  <span className="legend-item"><span className="legend-swatch" /> This run</span>
                  <span className="legend-item"><span className="legend-swatch warm" /> Machine off</span>
                  <span className="legend-item"><span style={{ width: 14, borderTop: '1px dashed #E4002B', display: 'inline-block' }} /> Target</span>
                </div>
              </div>
              <PPMChart series={result.series} baseline={result.baseline} c_target={cTarget} c_amb={cAmb} width={960} height={260} />
            </section>

            <section className="room-card">
              <div>
                <div className="room-card-head">
                  <div className="chart-card-title">ROOM · AXONOMETRIC</div>
                </div>
                <div className="room-viz">
                  <IsoRoom L={L} W={W} H={H} ppm={current.c_ppm} c_amb={cAmb} c_target={cTarget} people={people} />
                </div>
              </div>
              <div className="room-stats">
                <div className="stat"><span className="k">Volume</span><span className="v">{fmt(V, 1)} m³</span></div>
                <div className="stat"><span className="k">Footprint</span><span className="v">{fmt(L * W, 1)} m²</span></div>
                <div className="stat"><span className="k">Generation</span><span className="v">{fmt(people * perPerson, 0)} g/h</span></div>
                <div className="stat"><span className="k">Capture</span><span className="v">{fmt(current.capture_g_h, 1)} g/h</span></div>
                <div className="stat"><span className="k">Net removal</span>
                  <span className="v" style={{ color: netG > 0 ? '#4A7A3A' : 'var(--accent)' }}>
                    {netG > 0 ? '+' : ''}{fmt(netG, 1)} g/h
                  </span>
                </div>
              </div>
            </section>

            <details className="diag-card">
              <summary>COLUMN · DIAGNOSTICS <span className="micro mono" style={{ letterSpacing: '0.08em', color: 'var(--ink-3)', marginLeft: 10, textTransform: 'none', fontWeight: 400 }}>@ t = 0</span></summary>
              <div className="diag-body">
                <div className="diag-row">
                  <span className="k">C_in → C_out</span>
                  <span className="desc">Inlet and converged outlet concentration across the absorber.</span>
                  <span className="v">{fmt(current.c_ppm, 0)} → {fmt(current.c_out_ppm, 0)} ppm</span>
                </div>
                <div className="diag-row">
                  <span className="k">C̄ (log-mean)</span>
                  <span className="desc">Effective column-averaged ppm used in STY equation.</span>
                  <span className="v">{fmt(current.c_avg_ppm, 0)} ppm</span>
                </div>
                <div className="diag-row">
                  <span className="k">STY</span>
                  <span className="desc">CO₂ uptake per unit wire length at C̄ and S, mol·m⁻¹·s⁻¹.</span>
                  <span className="v">{(current.sty * 1e6).toFixed(3)} × 10⁻⁶</span>
                </div>
                <div className="diag-row">
                  <span className="k">Capture</span>
                  <span className="desc">Total wire × STY_eff × 3600.</span>
                  <span className="v">{fmt(current.capture_mol_h, 4)} mol/h · {fmt(current.capture_g_h, 2)} g/h</span>
                </div>
                <div className="diag-row">
                  <span className="k">Air mole flow</span>
                  <span className="desc">Fan m³/h × 41.57 mol/m³ (20 °C, 1 atm).</span>
                  <span className="v">{fmt(result.airMolH, 0)} mol/h</span>
                </div>
                <div className="diag-row">
                  <span className="k">Convergence</span>
                  <span className="desc">Warm-start from prev step; α=0.6 relaxation; tol 1 ppm.</span>
                  <span className="v">{current.iter} iter · {current.converged ? 'OK' : 'cap'}</span>
                </div>
              </div>
            </details>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
