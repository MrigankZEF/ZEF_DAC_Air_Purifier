<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Halon DC-1 · Room Simulator</title>
  <link rel="stylesheet" href="styles.css?v=4" />
  <style>
    html, body, #root { height: 100%; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="physics.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="controls.jsx"></script>
  <script type="text/babel" src="chart.jsx"></script>
  <script type="text/babel" src="iso-room.jsx"></script>
  <script type="text/babel" src="simulator.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>
  <script type="text/babel" src="closeups.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const DCv = window.DesignCanvas;
      const DCs = window.DCSection;
      const DCa = window.DCArtboard;
      return (
        <DCv>
          <DCs id="desktop" title="Desktop" subtitle="Two-column precision layout — controls left, canvas right">
            <DCa id="sim-desktop" label="01 · Simulator — desktop" width={1440} height={900}>
              <window.DACSimulator />
            </DCa>
          </DCs>

          <DCs id="mobile" title="Mobile" subtitle="Canvas stacks first; controls collapse into an accordion">
            <DCa id="sim-mobile" label="02 · Simulator — mobile" width={420} height={1200}>
              <window.DACMobile />
            </DCa>
          </DCs>

          <DCs id="closeups" title="Close-ups" subtitle="Chart, controls, room viz — at full fidelity">
            <DCa id="chart-closeup" label="03 · Chart styling" width={980} height={640}>
              <window.ChartCloseup />
            </DCa>
            <DCa id="slider-closeup" label="04 · Slider + tabular readouts" width={980} height={640}>
              <window.SliderCloseup />
            </DCa>
            <DCa id="room-closeup" label="05 · Axonometric room" width={980} height={640}>
              <window.RoomCloseup />
            </DCa>
          </DCs>
        </DCv>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
